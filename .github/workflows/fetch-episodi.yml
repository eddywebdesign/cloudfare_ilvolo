name: Recogida automatica puntate

on:
  # Cron disattivato: il sito è ora su Altervista con deploy manuale FTP,
  # la raccolta automatica delle puntate non serve più senza un deploy
  # collegato. Riattivabile ripristinando il blocco `schedule` sotto,
  # oppure lanciabile a mano da GitHub (tab Actions -> Run workflow).
  # schedule:
  #   - cron: "30 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Recogida puntate da deejay.it
        run: node scripts/fetch-episodi.mjs

      - name: Commit e push se ci sono nuove puntate
        run: |
          git config user.name "ilvolodellasera-bot"
          git config user.email "actions@users.noreply.github.com"
          if git status --porcelain content/episodi | grep -q .; then
            git add content/episodi
            git commit -m "chore: recogida automatica puntate $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Nessuna nuova puntata da committare."
          fi
