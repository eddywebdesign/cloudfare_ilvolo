{{ define "main" }}
<script>
(function () {
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
})();
</script>
<div id="pl-hero" class="hero">
  <img class="pl-hero__img" src="/immagini/playlist.jpg" alt="">
  <div class="hero-over"></div>
  <div class="hero-scroll" onclick="window.plScrollToSearch()">
    <svg class="hero-scroll__chevron" viewBox="0 0 24 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="1,1 12,13 23,1" stroke="rgba(245,239,223,0.55)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="s-verso__title visible">
    <h1 class="hero-title-main">Playlist</h1>
    <p class="hero-title__label hero-title__label--below">Tutte le canzoni delle puntate, giorno per giorno</p>
    <button id="pl-search-toggle" class="arc-search-btn">Cerca una canzone</button>
  </div>
</div>

<section id="pl-search-panel" class="arc-search-panel" hidden>
  <input id="pl-q" type="search" placeholder="Cerca per canzone, artista o data..." autocomplete="off">
  <div id="pl-results" class="pl-results"></div>
</section>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..700;1,300..700&family=IBM+Plex+Mono:wght@400;500&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

:root, :root[data-theme="dark"] {
  --font-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-sans:  'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --gold: #8fb8d9;
  --theme: #0b0e17;
}
html, body { background: #0b0e17 !important; }

/* ── Header trasparente sopra l'hero (identico alle altre pagine) ── */
.main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
header.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: transparent !important; box-shadow: none !important; border: none !important;
  width: 100vw;
  transition: background 0.3s ease, backdrop-filter 0.3s ease;
}
header.header.is-solid { background: rgba(11,14,23,0.85) !important; backdrop-filter: blur(10px); }
header.header nav, header.header .header-nav {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  position: relative !important; width: 100% !important; max-width: 100% !important;
  padding: 28px 40px !important; box-sizing: border-box !important;
}
header.header #menu {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 40px; list-style: none; margin: 0; padding: 0;
}
header.header #menu li { margin: 0; padding: 0; }
header.header #menu a {
  color: rgba(245,239,223,0.75) !important; font-family: var(--font-sans) !important;
  font-size: 1rem !important; font-weight: 400 !important; letter-spacing: -0.01em !important;
  text-decoration: none !important; transition: color 0.2s !important; line-height: 1 !important;
}
header.header #menu a:hover, header.header #menu .active { color: #f5efdf !important; }
.logo { color: #f5efdf !important; flex-shrink: 0; }
.logo a, .logo span { color: #f5efdf !important; font-style: italic; font-weight: 300; font-size: 1rem; letter-spacing: 0.01em; text-decoration: none !important; }
.logo-switches { flex-shrink: 0; }
.logo-switches a.theme-toggle { color: #8fb8d9 !important; }

/* ── HERO con immagine statica ── */
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; margin-left: calc(50% - 50vw); background: #0b0e17; }
.pl-hero__img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; filter: brightness(0.7) saturate(1.05);
}
.hero-over {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(11,14,23,0.1) 0%, rgba(11,14,23,0.0) 20%, rgba(11,14,23,0.3) 65%, rgba(11,14,23,0.94) 92%, rgba(11,14,23,1) 100%),
    linear-gradient(to right, rgba(11,14,23,0.55) 0%, rgba(11,14,23,0) 8%, rgba(11,14,23,0) 92%, rgba(11,14,23,0.55) 100%);
  z-index: 1;
}
.hero-scroll { position: absolute; bottom: 36px; right: 36px; z-index: 4; cursor: pointer; animation: plArrowBob 2.4s ease-in-out infinite; }
.hero-scroll__chevron { width: 28px; height: 17px; display: block; }
@keyframes plArrowBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
.s-verso__title {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
  padding: 0 24px; padding-top: 9vh;
}
.hero-title-main {
  font-family: var(--font-serif); font-size: clamp(2.6rem, 8vw, 6rem); font-weight: 300;
  letter-spacing: 0.01em; color: #f5efdf; text-shadow: 0 4px 40px rgba(0,0,0,0.6); margin: 0;
}
.hero-title__label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.2rem;
}
.hero-title__label--below { margin-bottom: 0; margin-top: 1.2rem; }
.arc-search-btn {
  font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px 36px; margin-top: 2.4rem; border-radius: 999px; border: 1px solid rgba(245,239,223,0.4);
  background: rgba(255,255,255,0.05); color: #f5efdf; cursor: pointer;
  backdrop-filter: blur(4px); transition: background 0.2s, border-color 0.2s;
}
.arc-search-btn:hover { background: rgba(245,239,223,0.12); border-color: rgba(245,239,223,0.7); }

.arc-search-panel { max-width: 780px; margin: 3rem auto; padding: 40px 24px 0; scroll-margin-top: 110px; }
#pl-q {
  width: 100%; padding: 0.9rem 1.1rem; font-size: 1rem; font-family: var(--font-sans, sans-serif);
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--entry); color: var(--primary); margin-bottom: 1.4rem;
}
#pl-q::placeholder { color: var(--secondary); }
.pl-results { display: grid; gap: 1rem; padding-bottom: 4rem; }
.pl-card {
  padding: 1.1rem 1.3rem; border: 1px solid var(--border);
  border-radius: 8px; transition: border-color 0.2s, background 0.2s;
}
.pl-card:hover { border-color: var(--gold, #8fb8d9); }
.pl-card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 0.7rem; }
.pl-card-date { font-family: var(--font-mono, monospace); font-size: 0.72rem; color: var(--secondary); letter-spacing: 0.05em; }
.pl-card-link { font-family: var(--font-serif, Georgia, serif); font-weight: 400; font-size: 1.05rem; color: var(--primary); text-decoration: none; }
.pl-card-link:hover { color: var(--gold, #8fb8d9); }
.pl-card-list { display: flex; flex-direction: column; }
.pl-card-item { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-top: 1px solid var(--border); }
.pl-card-item:first-child { border-top: none; }
.pl-card-cover { width: 32px; height: 32px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--tertiary); }
.pl-card-cover--placeholder { display: inline-flex; align-items: center; justify-content: center; color: var(--secondary); }
.pl-card-cover--placeholder svg { width: 14px; height: 14px; }
.pl-card-song { font-family: var(--font-serif, Georgia, serif); font-size: 0.85rem; color: var(--primary); }
.pl-card-artist { font-family: var(--font-mono, monospace); font-size: 0.62rem; letter-spacing: 0.06em; color: var(--secondary); margin-left: 8px; }
.arc-empty { opacity: 0.5; text-align: center; padding: 2rem 0; }
</style>

<script>
(function () {
  var panel = document.getElementById('pl-search-panel');

  function smoothScrollTo(targetY, duration) {
    var startY = window.scrollY;
    var dist = targetY - startY;
    var startT = null;
    function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function step(ts) {
      if (!startT) startT = ts;
      var p = Math.min((ts - startT) / duration, 1);
      window.scrollTo(0, startY + dist * ease(p));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  window.plScrollToSearch = function () {
    panel.hidden = false;
    smoothScrollTo(panel.offsetTop, 1800);
  };
})();
(function () {
  var data = [];
  var q = document.getElementById('pl-q');
  var results = document.getElementById('pl-results');
  var toggle = document.getElementById('pl-search-toggle');
  var panel = document.getElementById('pl-search-panel');

  var MUSIC_SVG = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 17V5.5L19 4v11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="16.5" cy="15.5" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>';

  toggle.addEventListener('click', function () {
    panel.hidden = !panel.hidden;
    if (!panel.hidden) { q.focus(); panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  });

  fetch('{{ (.OutputFormats.Get "json").RelPermalink }}')
    .then(function (r) { return r.json(); })
    .then(function (json) {
      data = json;
      render();
    });

  function songMatches(song, query) {
    return (song.titolo + ' ' + song.artista).toLowerCase().indexOf(query) !== -1;
  }

  function matches(item, query) {
    if (!query) return true;
    if (item.date.indexOf(query) !== -1) return true;
    for (var i = 0; i < item.playlist.length; i++) {
      if (songMatches(item.playlist[i], query)) return true;
    }
    return false;
  }

  function render() {
    var query = q.value.trim().toLowerCase();
    var filtered = data.filter(function (item) { return matches(item, query); });
    results.innerHTML = '';
    if (filtered.length === 0) {
      results.innerHTML = '<p class="arc-empty">Nessun risultato.</p>';
      return;
    }
    filtered.sort(function (a, b) { return a.date < b.date ? 1 : -1; });
    filtered.forEach(function (item) {
      var card = document.createElement('article');
      card.className = 'pl-card';
      var songsHtml = item.playlist.map(function (s) {
        var cover = s.cover
          ? '<img class="pl-card-cover" src="' + s.cover + '" alt="" loading="lazy">'
          : '<span class="pl-card-cover pl-card-cover--placeholder">' + MUSIC_SVG + '</span>';
        return '<div class="pl-card-item">' + cover +
          '<span class="pl-card-song">' + s.titolo + '</span>' +
          '<span class="pl-card-artist">' + s.artista + '</span>' +
          '</div>';
      }).join('');
      card.innerHTML =
        '<div class="pl-card-head">' +
        '<span class="pl-card-date">' + item.date + '</span>' +
        '<a class="pl-card-link" href="' + item.url + '">' + item.title + ' →</a>' +
        '</div>' +
        '<div class="pl-card-list">' + songsHtml + '</div>';
      results.appendChild(card);
    });
  }

  q.addEventListener('input', render);
})();
</script>
{{ end }}
