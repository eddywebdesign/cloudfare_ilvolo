{{ define "main" }}
<script>
(function () {
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
})();
</script>

{{ $categoria  := .Params.categoria }}
{{ $titoloPag  := .Title }}
{{ $sottotitolo := .Params.sottotitolo }}
{{ $heroImg    := .Params.hero_img | default "/immagini/archivio.jpg" }}

<div class="rif-hero hero">
  <img class="rif-hero__img" src="{{ $heroImg }}" alt="">
  <div class="hero-over"></div>
  <div class="hero-scroll" onclick="window.rifScrollToContent()">
    <svg class="hero-scroll__chevron" viewBox="0 0 24 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="1,1 12,13 23,1" stroke="rgba(245,239,223,0.55)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="s-verso__title visible">
    <p class="hero-title__label">{{ $categoria | upper }}</p>
    <h1 class="hero-title-main">{{ $titoloPag }}</h1>
    <p class="hero-title__label hero-title__label--below">{{ $sottotitolo }}</p>
  </div>
</div>

<section id="rif-content" class="rif-content">
  <div class="rif-toolbar">
    <input id="rif-q" type="search" placeholder="Cerca per titolo, autore, anno..." autocomplete="off">
    <span id="rif-count" class="rif-count"></span>
  </div>
  <div id="rif-subcat-row" class="rif-subcat-row" hidden></div>
  <div id="rif-grid" class="rif-grid"></div>
</section>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..700;1,300..700&family=IBM+Plex+Mono:wght@400;500&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

:root, :root[data-theme="dark"] {
  --font-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-sans:  'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --gold: #8fb8d9;
  --theme: #0b0e17;
  --cream: #f5efdf;
  --surf: rgba(255,255,255,0.04);
  --border-c: rgba(245,239,223,0.1);
}
html, body { background: #0b0e17 !important; }

.main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
header.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: transparent !important; box-shadow: none !important; border: none !important;
  width: 100vw; transition: background 0.3s ease, backdrop-filter 0.3s ease;
}
header.header.is-solid { background: rgba(11,14,23,0.85) !important; backdrop-filter: blur(10px); }
header.header nav, header.header .header-nav {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  position: relative !important; width: 100% !important; max-width: 100% !important;
  padding: 28px 40px !important; box-sizing: border-box !important;
}
header.header #menu {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 40px; list-style: none; margin: 0; padding: 0;
}
header.header #menu li { margin: 0; padding: 0; }
header.header #menu a {
  color: rgba(245,239,223,0.75) !important; font-family: var(--font-sans) !important;
  font-size: 1rem !important; font-weight: 400 !important; letter-spacing: -0.01em !important;
  text-decoration: none !important; transition: color 0.2s !important; line-height: 1 !important;
}
header.header #menu a:hover, header.header #menu .active { color: #f5efdf !important; }
.logo { color: #f5efdf !important; flex-shrink: 0; }
.logo a, .logo span { color: #f5efdf !important; font-style: italic; font-weight: 300; font-size: 1rem; letter-spacing: 0.01em; text-decoration: none !important; }
.logo-switches { flex-shrink: 0; }
.logo-switches a.theme-toggle { color: #8fb8d9 !important; }

/* ── HERO ── */
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; margin-left: calc(50% - 50vw); background: #0b0e17; }
.rif-hero__img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; filter: brightness(0.55) saturate(0.9);
}
.hero-over {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(11,14,23,0.1) 0%, rgba(11,14,23,0.0) 20%, rgba(11,14,23,0.3) 65%, rgba(11,14,23,0.94) 92%, rgba(11,14,23,1) 100%),
    linear-gradient(to right, rgba(11,14,23,0.55) 0%, rgba(11,14,23,0) 8%, rgba(11,14,23,0) 92%, rgba(11,14,23,0.55) 100%);
  z-index: 1;
}
.hero-scroll { position: absolute; bottom: 36px; right: 36px; z-index: 4; cursor: pointer; animation: rifArrowBob 2.4s ease-in-out infinite; }
.hero-scroll__chevron { width: 28px; height: 17px; display: block; }
@keyframes rifArrowBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
.s-verso__title {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
  padding: 0 24px; padding-top: 9vh;
}
.hero-title-main {
  font-family: var(--font-serif); font-size: clamp(2.6rem, 8vw, 6rem); font-weight: 300;
  letter-spacing: 0.01em; color: #f5efdf; text-shadow: 0 4px 40px rgba(0,0,0,0.6); margin: 0;
}
.hero-title__label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.2rem;
}
.hero-title__label--below { margin-bottom: 0; margin-top: 1.2rem; }

/* ── CONTENT ── */
.rif-content { max-width: 1100px; margin: 0 auto; padding: 3rem 24px 6rem; }

.rif-toolbar {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
}
.rif-subcat-row {
  display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2rem;
}
.rif-sc-btn {
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 999px; border: 1px solid rgba(245,239,223,0.15);
  background: transparent; color: rgba(245,239,223,0.4); cursor: pointer; transition: all 0.15s;
}
.rif-sc-btn:hover { border-color: rgba(245,239,223,0.4); color: rgba(245,239,223,0.8); }
.rif-sc-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(154,161,173,0.08); }
#rif-q {
  flex: 1; padding: 0.85rem 1.1rem; font-size: 1rem; font-family: var(--font-sans, sans-serif);
  border-radius: 6px; border: 1px solid var(--border-c);
  background: var(--surf); color: var(--cream);
}
#rif-q::placeholder { color: rgba(245,239,223,0.35); }
.rif-count { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; color: var(--gold); white-space: nowrap; }

/* ── GRID DI CARD ── */
.rif-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.4rem;
}
.rif-card {
  background: var(--surf); border: 1px solid var(--border-c);
  border-radius: 10px; padding: 0; overflow: hidden;
  display: flex; flex-direction: row; gap: 0; align-items: stretch;
  transition: border-color 0.2s, background 0.2s;
}
.rif-card:hover { border-color: rgba(143,184,217,0.35); background: rgba(255,255,255,0.06); }
.rif-cover {
  width: 72px; flex-shrink: 0; background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.rif-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.rif-cover svg { width: 100%; height: 100%; display: block; }
.rif-card__body { flex: 1; padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 0.5rem; min-width: 0; }
.rif-card__titolo {
  font-family: var(--font-serif); font-size: 1.15rem; font-weight: 500;
  color: var(--cream); line-height: 1.3; margin: 0;
}
.rif-card__meta {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em;
  color: var(--gold); text-transform: uppercase;
}
.rif-card__note {
  font-family: var(--font-sans); font-size: 0.85rem; color: rgba(245,239,223,0.6);
  line-height: 1.5; margin-top: 0.2rem;
}
.rif-card__sc { color: rgba(245,239,223,0.35); font-size: 0.62rem; letter-spacing: 0.06em; }
.rif-card__episodi {
  margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.3rem;
}
.rif-card__ep-link {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.06em;
  color: rgba(143,184,217,0.75); text-decoration: none;
  display: inline-flex; align-items: center; gap: 0.4em;
  transition: color 0.15s;
}
.rif-card__ep-link:hover { color: var(--gold); }
.rif-card__ep-link svg { width: 10px; height: 10px; flex-shrink: 0; }

/* ── SEZIONE DA IDENTIFICARE ── */
.rif-unknown-section { margin-top: 4rem; }
.rif-unknown-title {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(245,239,223,0.3); margin-bottom: 1.2rem;
}
.rif-unknown-list { display: flex; flex-direction: column; gap: 0.5rem; }
.rif-unknown-item {
  padding: 0.8rem 1rem; border: 1px solid var(--border-c);
  border-radius: 6px; background: var(--surf);
  font-family: var(--font-sans); font-size: 0.82rem;
  color: rgba(245,239,223,0.45); line-height: 1.5;
  display: flex; align-items: baseline; gap: 1rem; justify-content: space-between;
}
.rif-unknown-item__testo { flex: 1; }
.rif-unknown-item__time {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.06em;
  color: var(--gold); white-space: nowrap; flex-shrink: 0;
}
.rif-unknown-item__link {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.06em;
  color: rgba(143,184,217,0.5); text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.rif-unknown-item__link:hover { color: var(--gold); }

/* ── GRUPPI PER ANNO ── */
.rif-group { margin-bottom: 0.8rem; }
.rif-group__summary {
  font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(245,239,223,0.45); cursor: pointer; padding: 0.6rem 0;
  list-style: none; display: flex; align-items: center; gap: 0.5rem;
  border-bottom: 1px solid var(--border-c); margin-bottom: 1rem;
  user-select: none;
}
.rif-group__summary::-webkit-details-marker { display: none; }
.rif-group__summary::before { content: '▶'; font-size: 0.5rem; transition: transform 0.2s; color: var(--gold); }
details[open] > .rif-group__summary::before { transform: rotate(90deg); }
.rif-group__count { color: var(--gold); }
.rif-group__grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.4rem; margin-bottom: 1.4rem;
}

@media (max-width: 640px) {
  .rif-content         { padding: 2rem 16px 4rem; }
  .rif-group__grid     { grid-template-columns: 1fr; }
  .rif-unknown-item    { flex-direction: column; gap: 0.4rem; }
  .rif-unknown-item__link { white-space: normal; }
}
</style>

<script>
(function() {
  /* ── Dati iniettati da Hugo ── */
  var CATEGORIA = {{ $categoria | jsonify | safeJS }};
  var RAW = {{ $.Site.Data.riferimenti | jsonify | safeJS }};
  var OMDB_KEY = {{ $.Site.Data.config.omdb_key | jsonify | safeJS }};

  /* Appiattisce tutte le date in un unico array filtrato per categoria */
  var voci = [];
  Object.keys(RAW).sort().forEach(function(data) {
    var arr = RAW[data];
    if (!Array.isArray(arr)) return;
    arr.forEach(function(v) {
      if (v.categoria === CATEGORIA) voci.push(v);
    });
  });

  /* Raggruppa per titolo (le voci identificate) */
  var byTitolo = {};
  var sconosciute = [];
  voci.forEach(function(v) {
    if (!v.titolo || v.note === 'non identificato') {
      sconosciute.push(v);
    } else {
      var key = v.titolo.toLowerCase().trim();
      if (!byTitolo[key]) byTitolo[key] = { voce: v, episodi: [] };
      byTitolo[key].episodi.push(v);
    }
  });

  /* Ordina titoli A-Z */
  var titoli = Object.keys(byTitolo).sort();

  /* ── Sottocategorie disponibili ── */
  var SC_LABEL = {
    romanzo: 'Romanzo', poesia: 'Poesia', saggio: 'Saggio',
    citazione: 'Citazione', lettura_volo: 'Lettura in volo', documentario: 'Documentario'
  };
  var subcatSet = {};
  titoli.forEach(function(k) {
    var sc = byTitolo[k].voce.sottocategoria || '';
    if (sc) subcatSet[sc] = true;
  });
  var subcats = Object.keys(subcatSet);
  var activeSubcat = '';
  var subcatRow = document.getElementById('rif-subcat-row');
  if (subcats.length) {
    subcatRow.removeAttribute('hidden');
    var btns = '<button class="rif-sc-btn active" data-sc="">Tutti</button>';
    subcats.forEach(function(sc) {
      btns += '<button class="rif-sc-btn" data-sc="' + sc + '">' + (SC_LABEL[sc] || sc) + '</button>';
    });
    subcatRow.innerHTML = btns;
    subcatRow.addEventListener('click', function(e) {
      var btn = e.target.closest('.rif-sc-btn');
      if (!btn) return;
      subcatRow.querySelectorAll('.rif-sc-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeSubcat = btn.dataset.sc;
      render(document.getElementById('rif-q').value);
      loadCovers();
    });
  }

  /* ── Rendering ── */
  var grid = document.getElementById('rif-grid');
  var countEl = document.getElementById('rif-count');

  function episodioUrl(v) {
    return '/episodi/' + v.episodio_data + '/#t=' + Math.floor(v.start);
  }

  function fmtTime(sec) {
    var s = Math.floor(sec || 0);
    return (Math.floor(s / 60) < 10 ? '0' : '') + Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
  }

  function playIcon() {
    return '<svg viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>';
  }

  function renderCard(gruppo) {
    var v = gruppo.voce;
    var meta = [v.autore, v.anno].filter(Boolean).join(' · ');
    var epLinks = gruppo.episodi.map(function(ep) {
      return '<a class="rif-card__ep-link" href="' + episodioUrl(ep) + '" target="_blank">' +
        playIcon() +
        ep.episodio_data +
        '</a>';
    }).join('');

    var coverEl = '<div class="rif-cover">' +
      '<img data-rif-titolo="' + esc(v.titolo) + '" data-rif-cat="' + esc(v.categoria) + '" src="" alt="" loading="lazy">' +
      '</div>';

    var scLabel = v.sottocategoria ? (SC_LABEL[v.sottocategoria] || v.sottocategoria) : '';
    return '<div class="rif-card" data-titolo="' + esc(v.titolo) + '" data-meta="' + esc(meta) + '">' +
      coverEl +
      '<div class="rif-card__body">' +
        '<p class="rif-card__titolo">' + esc(v.titolo) + '</p>' +
        (meta ? '<p class="rif-card__meta">' + esc(meta) + (scLabel ? ' <span class="rif-card__sc">· ' + esc(scLabel) + '</span>' : '') + '</p>' : '') +
        (v.note && v.note !== 'non identificato' ? '<p class="rif-card__note">' + esc(v.note) + '</p>' : '') +
        '<div class="rif-card__episodi">' + epLinks + '</div>' +
      '</div>' +
      '</div>';
  }

  function showPlaceholder(coverDiv, cat) {
    var colors = { film: '#ffb464', libro: '#78c896', musica: '#8fb8d9', lettura: '#b09fca' };
    var icons  = { film: '▶', libro: '◼', musica: '♪', lettura: '❝' };
    var c = colors[cat] || '#9aa1ad';
    var icon = icons[cat] || '?';
    coverDiv.innerHTML = '<svg viewBox="0 0 72 108" xmlns="http://www.w3.org/2000/svg">' +
      '<rect width="72" height="108" fill="' + c + '" opacity="0.12"/>' +
      '<text x="36" y="62" text-anchor="middle" dominant-baseline="middle" font-size="26" fill="' + c + '" opacity="0.6">' + icon + '</text>' +
      '</svg>';
  }

  function loadCovers() {
    document.querySelectorAll('.rif-cover img').forEach(function(img) {
      var titolo = img.dataset.rifTitolo;
      var cat    = img.dataset.rifCat;
      var cover  = img.parentElement;
      if (!titolo) { showPlaceholder(cover, cat); return; }
      if (cat === 'libro') {
        img.src = 'https://covers.openlibrary.org/b/title/' + encodeURIComponent(titolo) + '-M.jpg';
        img.onerror = function() { showPlaceholder(cover, cat); };
        img.onload  = function() { if (!this.naturalWidth) showPlaceholder(cover, cat); };
      } else if (cat === 'film' && OMDB_KEY) {
        img.src = 'https://img.omdbapi.com/?apikey=' + OMDB_KEY + '&t=' + encodeURIComponent(titolo);
        img.onerror = function() { showPlaceholder(cover, cat); };
      } else {
        showPlaceholder(cover, cat);
      }
    });
  }


  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(query) {
    var q = (query || '').toLowerCase().trim();
    var visible = titoli.filter(function(k) {
      var g = byTitolo[k];
      if (activeSubcat && (g.voce.sottocategoria || '') !== activeSubcat) return false;
      if (!q) return true;
      return (g.voce.titolo + ' ' + g.voce.autore + ' ' + g.voce.anno).toLowerCase().includes(q);
    });

    countEl.textContent = visible.length + ' ' + (CATEGORIA === 'film' ? 'film' : 'libri') + ' identificati';

    /* Raggruppa per anno */
    var byAnno = {};
    visible.forEach(function(k) {
      var anno = byTitolo[k].voce.anno || 'Anno sconosciuto';
      if (!byAnno[anno]) byAnno[anno] = [];
      byAnno[anno].push(k);
    });
    var anni = Object.keys(byAnno).sort(function(a, b) {
      if (a === 'Anno sconosciuto') return 1;
      if (b === 'Anno sconosciuto') return -1;
      return parseInt(b) - parseInt(a);
    });
    var isFirst = true;
    grid.innerHTML = anni.map(function(anno) {
      var cards = byAnno[anno].map(function(k) { return renderCard(byTitolo[k]); }).join('');
      var openAttr = isFirst ? ' open' : '';
      isFirst = false;
      return '<details class="rif-group"' + openAttr + '>' +
        '<summary class="rif-group__summary">' + esc(anno) +
        ' <span class="rif-group__count">(' + byAnno[anno].length + ')</span></summary>' +
        '<div class="rif-group__grid">' + cards + '</div>' +
        '</details>';
    }).join('');

  }

  render();
  loadCovers();

  document.getElementById('rif-q').addEventListener('input', function() { render(this.value); loadCovers(); });

  /* Scroll-to-content */
  window.rifScrollToContent = function() {
    document.getElementById('rif-content').scrollIntoView({ behavior: 'smooth' });
  };

  /* Header is-solid */
  var headerEl = document.querySelector('header.header');
  if (headerEl) {
    window.addEventListener('scroll', function() {
      headerEl.classList.toggle('is-solid', window.scrollY > window.innerHeight * 0.6);
    });
  }
})();
</script>
{{ end }}
