{{ define "main" }}
<script>
(function () {
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
})();
</script>

<header class="arc-page-head">
  <a class="arc-back" href="/" aria-label="Torna alla home">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M15 19 8 12l7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Home</span>
  </a>
  <h1 class="arc-page-title">Frammenti</h1>
  <p class="arc-page-sub" id="arc-page-sub">I frammenti trovati nell'archivio</p>
</header>

<section id="arc-search-panel" class="arc-search-panel">
  <nav id="arc-years" class="arc-year-filters" aria-label="Filtra per anno"></nav>
  <details class="arc-filters-spoiler">
    <summary>Filtra per tema</summary>
    <div id="arc-temi" class="arc-tag-filters"></div>
  </details>
  <div id="arc-results" class="arc-results"></div>
</section>

<style>

:root, :root[data-theme="dark"] {
  --font-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-sans:  'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --gold: #8fb8d9;
  --theme: #0b0e17;
  --entry: #161b29;
  --primary: #f5efdf;
  --secondary: #9aa1ad;
  --tertiary: #232838;
  --content: rgba(245,239,223,0.78);
  --border: rgba(245,239,223,0.14);
}
html, body { background: #0b0e17 !important; }

.main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
header.header {
  position: fixed !important; top: 0; left: 0; right: 0; z-index: 100; width: 100vw;
  background: var(--theme) !important; border-bottom: 1px solid var(--border);
}
header.header nav, header.header .header-nav {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  position: relative !important; width: 100% !important; max-width: 100% !important;
  padding: 28px 40px !important; box-sizing: border-box !important;
}
header.header #menu {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 40px; list-style: none; margin: 0; padding: 0;
}
header.header #menu a {
  color: rgba(245,239,223,0.75) !important; font-family: var(--font-sans) !important;
  font-size: 1rem !important; font-weight: 400 !important; letter-spacing: -0.01em !important;
  text-decoration: none !important;
}
header.header #menu a:hover, header.header #menu .active { color: #f5efdf !important; }
.logo, .logo a, .logo span { color: #f5efdf !important; font-style: italic; font-weight: 300; text-decoration: none !important; }

.arc-page-head { max-width: 780px; margin: 0 auto; padding: 150px 24px 0; text-align: center; }
.arc-back {
  position: fixed; bottom: 24px; left: 24px; z-index: 90;
  display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 0.85rem; color: var(--secondary); text-decoration: none; transition: color 0.2s;
}
.arc-back svg { width: 16px; height: 16px; }
.arc-back:hover { color: var(--gold); }
.arc-page-title { font-family: var(--font-serif); font-weight: 300; font-size: clamp(2rem, 5vw, 3rem); color: var(--primary); margin: 0; }
.arc-page-sub { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-top: 0.8rem; }

.arc-search-panel { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }
.arc-year-filters {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 1.4rem;
}
.arc-year-btn {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(245,239,223,0.6); background: transparent;
  border: 1px solid rgba(245,239,223,0.18); border-radius: 999px;
  padding: 9px 18px; cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.arc-year-btn__count { color: rgba(245,239,223,0.35); margin-left: 4px; }
.arc-year-btn:hover { color: #f5efdf; border-color: rgba(245,239,223,0.4); }
.arc-year-btn.is-active { color: #0b0e17; background: var(--gold, #8fb8d9); border-color: var(--gold, #8fb8d9); }
.arc-year-btn.is-active .arc-year-btn__count { color: rgba(11,14,23,0.55); }
.arc-year-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.arc-year-btn:disabled:hover { color: rgba(245,239,223,0.6); border-color: rgba(245,239,223,0.18); }
.arc-filters-spoiler { margin-bottom: 2rem; }
.arc-filters-spoiler summary {
  cursor: pointer; font-family: var(--font-sans, sans-serif); font-size: 0.85rem;
  color: var(--secondary); padding: 0.4rem 0; user-select: none;
}
.arc-filters-spoiler summary:hover { color: var(--primary); }
.arc-tag-filters { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.8rem; }
.arc-tag-group { border: 1px solid var(--border); border-radius: 8px; padding: 0 0.9rem; }
.arc-tag-group__summary {
  cursor: pointer; list-style: none; user-select: none;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono, monospace); font-size: 0.72rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold, #8fb8d9);
  padding: 0.7rem 0;
}
.arc-tag-group__summary::-webkit-details-marker { display: none; }
.arc-tag-group__count { color: var(--secondary); font-size: 0.68rem; letter-spacing: 0.05em; }
.arc-tag-group[open] .arc-tag-group__summary { border-bottom: 1px solid var(--border); }
.arc-tag-group__body { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.8rem 0; }
.arc-tag-btn {
  border: 1px solid var(--border); background: transparent; color: var(--secondary);
  border-radius: 999px; padding: 0.35rem 1rem; cursor: pointer; font-size: 0.78rem; letter-spacing: 0.04em;
  font-family: var(--font-sans, sans-serif);
}
.arc-tag-btn__count { color: rgba(154,161,173,0.7); font-size: 0.9em; }
.arc-tag-btn.active { background: var(--gold, #8fb8d9); border-color: var(--gold, #8fb8d9); color: #0b0e17; }
.arc-tag-btn.active .arc-tag-btn__count { color: rgba(11,14,23,0.55); }
.arc-tag-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.arc-results { display: grid; gap: 1rem; }
.arc-card {
  display: block; padding: 1.1rem 1.3rem; border: 1px solid var(--border);
  border-radius: 8px; text-decoration: none; color: inherit; transition: border-color 0.2s, background 0.2s;
}
.arc-card:hover { border-color: var(--gold, #8fb8d9); background: rgba(34,158,217,0.05); }
.arc-card-date { font-family: var(--font-mono, monospace); font-size: 0.72rem; color: var(--secondary); letter-spacing: 0.05em; }
.arc-card-title { font-family: var(--font-serif, Georgia, serif); font-weight: 400; font-size: 1.2rem; color: var(--primary); margin: 0.3rem 0; }
.arc-card-resumen { font-size: 0.9rem; color: var(--content); line-height: 1.5; }
.arc-card-badges { margin-top: 0.7rem; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.arc-card-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--secondary); background: var(--tertiary); padding: 3px 9px; border-radius: 3px;
}
.arc-card-badge svg { width: 12px; height: 12px; }
.arc-card-badge--video { color: var(--gold, #8fb8d9); }
.arc-card-badge--rif { color: var(--primary); background: rgba(245,239,223,0.1); }
.arc-card-temi { margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 6px; }
.arc-card-temi span { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gold, #8fb8d9); background: rgba(34,158,217,0.12); padding: 2px 8px; border-radius: 3px; }
.arc-empty { opacity: 0.5; text-align: center; padding: 2rem 0; }

@media (max-width: 640px) {
  .arc-page-head       { padding: 120px 16px 0; }
  .arc-search-panel    { padding: 24px 16px 60px; }
  .arc-year-filters    { flex-wrap: wrap; gap: 6px; }
  .arc-year-btn        { font-size: 0.7rem; padding: 4px 10px; }
  .arc-card            { padding: 14px 16px; }
  .arc-card-title      { font-size: 1.05rem; }
}
</style>

<script>
(function () {
  var data = [];
  var temiWrap = document.getElementById('arc-temi');
  var yearsWrap = document.getElementById('arc-years');
  var results = document.getElementById('arc-results');
  var activeTemi = new Set();
  var activeYear = 'tutti';

  var VIDEO_ICON = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="m22 8-5 3 5 3z" fill="currentColor"/></svg>';
  var PLAYLIST_ICON = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 17V5.5L19 4v11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="16.5" cy="15.5" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>';

  var params = new URLSearchParams(window.location.search);
  var searchQuery = params.get('q') || '';

  if (searchQuery) {
    var subEl = document.getElementById('arc-page-sub');
    if (subEl) subEl.textContent = 'Risultati per « ' + searchQuery + ' »';
  }

  fetch('{{ "/index.json" | relURL }}')
    .then(function (r) { return r.json(); })
    .then(function (json) {
      data = json;
      renderYearFilters();
      renderTemiFilters();
      render();
    });

  var yearBtns = {}; // anno -> { btn, countEl }
  var temaBtns = {}; // tema -> { btn, countEl }
  var tuttiBtnRef = null;

  function renderYearFilters() {
    var years = {};
    data.forEach(function (item) {
      var y = (item.date || '').slice(0, 4);
      if (y) years[y] = true;
    });
    var sortedYears = Object.keys(years).sort(function (a, b) { return b - a; });
    yearsWrap.innerHTML = '';
    yearBtns = {};

    var tuttiBtn = document.createElement('button');
    tuttiBtn.type = 'button';
    tuttiBtn.className = 'arc-year-btn is-active';
    var tuttiCount = document.createElement('span');
    tuttiCount.className = 'arc-year-btn__count';
    tuttiBtn.appendChild(document.createTextNode('Tutti '));
    tuttiBtn.appendChild(tuttiCount);
    tuttiBtn.addEventListener('click', function () { setActiveYear('tutti', tuttiBtn); });
    yearsWrap.appendChild(tuttiBtn);
    tuttiBtnRef = { btn: tuttiBtn, countEl: tuttiCount };

    sortedYears.forEach(function (y) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'arc-year-btn';
      var countEl = document.createElement('span');
      countEl.className = 'arc-year-btn__count';
      btn.appendChild(document.createTextNode(y + ' '));
      btn.appendChild(countEl);
      btn.addEventListener('click', function () { if (!btn.disabled) setActiveYear(y, btn); });
      yearsWrap.appendChild(btn);
      yearBtns[y] = { btn: btn, countEl: countEl };
    });
  }

  function setActiveYear(year, btn) {
    activeYear = year;
    yearsWrap.querySelectorAll('.arc-year-btn').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
    render();
  }

  function renderTemiFilters() {
    var all = new Set();
    data.forEach(function (item) { (item.temi || []).forEach(function (t) { all.add(t); }); });
    temiWrap.innerHTML = '';
    temaBtns = {};
    var sorted = Array.from(all).sort(function (a, b) { return a.localeCompare(b, 'it'); });
    var groups = {};
    var letterOrder = [];
    sorted.forEach(function (tema) {
      var letter = tema.charAt(0).toUpperCase();
      if (!groups[letter]) { groups[letter] = []; letterOrder.push(letter); }
      groups[letter].push(tema);
    });
    letterOrder.forEach(function (letter) {
      var group = document.createElement('details');
      group.className = 'arc-tag-group';
      var summary = document.createElement('summary');
      summary.className = 'arc-tag-group__summary';
      summary.innerHTML = letter + ' <span class="arc-tag-group__count">' + groups[letter].length + '</span>';
      group.appendChild(summary);
      var body = document.createElement('div');
      body.className = 'arc-tag-group__body';
      groups[letter].forEach(function (tema) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'arc-tag-btn';
        btn.appendChild(document.createTextNode(tema + ' '));
        var countEl = document.createElement('span');
        countEl.className = 'arc-tag-btn__count';
        btn.appendChild(countEl);
        btn.addEventListener('click', function () {
          if (btn.disabled) return;
          if (activeTemi.has(tema)) { activeTemi.delete(tema); btn.classList.remove('active'); }
          else { activeTemi.add(tema); btn.classList.add('active'); }
          render();
        });
        body.appendChild(btn);
        temaBtns[tema] = { btn: btn, countEl: countEl };
      });
      group.appendChild(body);
      temiWrap.appendChild(group);
    });
  }

  var MESI = {
    gennaio: '01', febbraio: '02', marzo: '03', aprile: '04', maggio: '05', giugno: '06',
    luglio: '07', agosto: '08', settembre: '09', ottobre: '10', novembre: '11', dicembre: '12'
  };

  function normalizza(s) {
    return (s || '').toString().toLowerCase().normalize('NFD').replace(new RegExp('[̀-ͯ]', 'g'), '');
  }

  /* Motore di ricerca: interpreta la query come una serie di token in AND.
     Token che sono un anno (4 cifre) o un mese italiano vengono usati per
     filtrare la data della puntata; gli altri token devono comparire tutti
     (in qualsiasi ordine) nel testo aggregato di titolo, resumen, temi,
     frammenti e playlist. Cosi' "aprile 2026", "dante inferno" o "pink floyd"
     funzionano tutti come ricerche mirate invece che una singola sottostringa.
     Separata dai filtri anno/tema (matchesYearVal/matchesTemiSet) cosi' da
     poter ricalcolare i conteggi delle pillole anno/tema restando coerenti
     con la ricerca testuale attiva, senza duplicare la logica. */
  function matchesQueryText(item) {
    if (!searchQuery) return true;
    var tokens = normalizza(searchQuery).split(/\s+/).filter(Boolean);
    var year = null, month = null;
    var textTokens = [];
    tokens.forEach(function (tok) {
      if (/^\d{4}$/.test(tok)) { year = tok; return; }
      if (MESI[tok]) { month = MESI[tok]; return; }
      textTokens.push(tok);
    });

    if (year && (item.date || '').slice(0, 4) !== year) return false;
    if (month && (item.date || '').slice(5, 7) !== month) return false;

    if (textTokens.length) {
      var haystack = normalizza([item.title, item.resumen]
        .concat(item.temi || [], item.tipi || [], item.frammenti || [], item.playlist || [], item.riferimenti || [], item.categorieRif || [])
        .join(' '));
      for (var i = 0; i < textTokens.length; i++) {
        if (haystack.indexOf(textTokens[i]) === -1) return false;
      }
    }
    return true;
  }

  function matchesTemiSet(item, temiSet) {
    if (temiSet.size === 0) return true;
    var itemTemi = item.temi || [];
    for (var t of temiSet) { if (itemTemi.indexOf(t) === -1) return false; }
    return true;
  }

  function matchesYearVal(item, year) {
    return year === 'tutti' || (item.date || '').slice(0, 4) === year;
  }

  function matches(item) {
    return matchesQueryText(item) && matchesTemiSet(item, activeTemi) && matchesYearVal(item, activeYear);
  }

  /* Ricalcola i numeri sulle pillole anno e sui tag tema in base alla query
     testuale e ai filtri gia' attivi, disabilitando quelli che porterebbero
     a "Nessun risultato" se cliccati — invece di lasciare che l'utente lo
     scopra a tentativi. */
  function updateFacetCounts() {
    var tuttiCount = data.filter(function (item) { return matchesQueryText(item) && matchesTemiSet(item, activeTemi); }).length;
    if (tuttiBtnRef) {
      tuttiBtnRef.countEl.textContent = tuttiCount;
      tuttiBtnRef.btn.disabled = tuttiCount === 0 && activeYear !== 'tutti';
    }
    Object.keys(yearBtns).forEach(function (y) {
      var count = data.filter(function (item) {
        return matchesQueryText(item) && matchesTemiSet(item, activeTemi) && matchesYearVal(item, y);
      }).length;
      yearBtns[y].countEl.textContent = count;
      yearBtns[y].btn.disabled = count === 0 && activeYear !== y;
    });
    Object.keys(temaBtns).forEach(function (tema) {
      var isActive = activeTemi.has(tema);
      var testSet = new Set(activeTemi);
      testSet.add(tema);
      var count = data.filter(function (item) {
        return matchesQueryText(item) && matchesYearVal(item, activeYear) && matchesTemiSet(item, testSet);
      }).length;
      temaBtns[tema].countEl.textContent = count;
      temaBtns[tema].btn.disabled = count === 0 && !isActive;
    });
  }

  function render() {
    updateFacetCounts();
    var filtered = data.filter(matches);
    results.innerHTML = '';
    if (filtered.length === 0) {
      results.innerHTML = '<p class="arc-empty">Nessun risultato.</p>';
      return;
    }
    filtered.sort(function (a, b) { return a.date < b.date ? 1 : -1; });
    filtered.forEach(function (item) {
      var card = document.createElement('a');
      card.className = 'arc-card';
      card.href = item.url;

      var badges = (item.tipi || []).map(function (t) {
        return '<span class="arc-card-badge">' + t + '</span>';
      });
      (item.categorieRif || []).forEach(function (cat) {
        badges.push('<span class="arc-card-badge arc-card-badge--rif">' + cat + '</span>');
      });
      if (item.hasPlaylist) badges.push('<span class="arc-card-badge">' + PLAYLIST_ICON + ' playlist</span>');
      if (item.hasVideo) badges.push('<span class="arc-card-badge arc-card-badge--video">' + VIDEO_ICON + ' video</span>');

      var temiHtml = (item.temi || []).map(function (t) { return '<span>' + t + '</span>'; }).join('');
      card.innerHTML =
        '<div class="arc-card-date">' + item.date + '</div>' +
        '<div class="arc-card-title">' + item.title + '</div>' +
        '<div class="arc-card-resumen">' + (item.resumen || '') + '</div>' +
        (badges.length ? '<div class="arc-card-badges">' + badges.join('') + '</div>' : '') +
        (temiHtml ? '<div class="arc-card-temi">' + temiHtml + '</div>' : '');
      results.appendChild(card);
    });
  }

})();
</script>
{{ end }}
