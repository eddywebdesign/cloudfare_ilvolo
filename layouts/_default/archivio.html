{{ define "main" }}
<script>
(function () {
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
})();
</script>
<div id="arc-hero" class="hero">
  <video class="hero-video" id="arc-hero-video" autoplay muted loop playsinline preload="auto">
    <source src="/video/tramonto_movement.mp4" type="video/mp4">
  </video>
  <div class="hero-loader" id="arc-hero-loader" aria-hidden="true">
    <span class="hero-loader__ring"></span>
  </div>
  <div class="hero-over"></div>
  <div class="hero-scroll" onclick="window.arcScrollToSearch()">
    <svg class="hero-scroll__chevron" viewBox="0 0 24 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="1,1 12,13 23,1" stroke="rgba(245,239,223,0.55)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="hero-copyright">©Ahmet Kurt</div>
  <div class="s-verso__title visible">
    <h1 class="hero-title-main">Archivio</h1>
    <p class="hero-title__label hero-title__label--below">Cerca puntate, temi e frammenti</p>
    <button id="arc-search-toggle" class="arc-search-btn">Cerca nell'archivio</button>
  </div>
</div>

<section id="arc-search-panel" class="arc-search-panel" hidden>
  <input id="arc-q" type="search" placeholder="Cerca per titolo, tema, autore..." autocomplete="off">
  <nav id="arc-years" class="arc-year-filters" aria-label="Filtra per anno"></nav>
  <details class="arc-filters-spoiler">
    <summary>Filtra per tema</summary>
    <div id="arc-temi" class="arc-tag-filters"></div>
  </details>
  <div id="arc-results" class="arc-results"></div>
</section>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..700;1,300..700&family=IBM+Plex+Mono:wght@400;500&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap');

:root {
  --font-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-sans:  'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --gold: #8fb8d9;
}

/* ── Header trasparente sopra l'hero (identico alla homepage) ── */
.main { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
header.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: transparent !important; box-shadow: none !important; border: none !important;
  width: 100vw;
}
header.header nav, header.header .header-nav {
  display: flex !important; align-items: center !important; justify-content: space-between !important;
  position: relative !important; width: 100% !important; max-width: 100% !important;
  padding: 28px 40px !important; box-sizing: border-box !important;
}
header.header #menu {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 40px; list-style: none; margin: 0; padding: 0;
}
header.header #menu li { margin: 0; padding: 0; }
header.header #menu a {
  color: rgba(245,239,223,0.75) !important; font-family: var(--font-sans) !important;
  font-size: 1rem !important; font-weight: 400 !important; letter-spacing: -0.01em !important;
  text-decoration: none !important; transition: color 0.2s !important; line-height: 1 !important;
}
header.header #menu a:hover, header.header #menu .active { color: #f5efdf !important; }
.logo { color: #f5efdf !important; flex-shrink: 0; }
.logo a, .logo span { color: #f5efdf !important; font-style: italic; font-weight: 300; font-size: 1rem; letter-spacing: 0.01em; text-decoration: none !important; }
.logo-switches { flex-shrink: 0; }
.logo-switches a.theme-toggle { color: #8fb8d9 !important; }

/* ── HERO (identico alla homepage) ── */
.hero { position: relative; width: 100vw; height: 100vh; overflow: hidden; margin-left: calc(50% - 50vw); }
.hero-video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; filter: brightness(0.75) saturate(1.1);
}
.hero-over {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(11,14,23,0.08) 0%, rgba(11,14,23,0.0) 22%, rgba(11,14,23,0.05) 55%, rgba(11,14,23,0.22) 72%, rgba(11,14,23,0.55) 84%, rgba(11,14,23,0.88) 94%, rgba(11,14,23,1) 100%),
    linear-gradient(to right, rgba(11,14,23,0.55) 0%, rgba(11,14,23,0) 8%, rgba(11,14,23,0) 92%, rgba(11,14,23,0.55) 100%);
  z-index: 1;
}
/* Loader elegante durante il caricamento del video: anelli pulsanti,
   sparisce non appena il video parte (con fallback a tempo in JS). */
.hero-loader {
  position: absolute; inset: 0; z-index: 6;
  display: flex; align-items: center; justify-content: center;
  opacity: 1;
  transition: opacity 0.7s ease;
  pointer-events: none;
}
.hero-loader.hero-loader--hidden { opacity: 0; }
.hero-loader__ring { position: relative; width: 40px; height: 40px; }
.hero-loader__ring::before,
.hero-loader__ring::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--gold);
  animation: heroLoaderPulse 1.8s ease-out infinite;
}
.hero-loader__ring::after { animation-delay: 0.9s; }
@keyframes heroLoaderPulse {
  0%   { transform: scale(0.4); opacity: 0.9; }
  100% { transform: scale(1.6); opacity: 0; }
}

.hero-scroll { position: absolute; bottom: 36px; right: 36px; z-index: 4; cursor: pointer; animation: arcArrowBob 2.4s ease-in-out infinite; }
.hero-scroll__chevron { width: 28px; height: 17px; display: block; }
@keyframes arcArrowBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
.hero-copyright {
  position: absolute; bottom: 14px; left: 14px; z-index: 4;
  font-family: var(--font-sans); font-size: 0.6rem; font-weight: 300; letter-spacing: 0.02em;
  color: rgba(245,239,223,0.35); pointer-events: none;
}
.s-verso__title {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
  padding: 0 24px; padding-top: 9vh;
}
.hero-title-main {
  font-family: var(--font-serif); font-size: clamp(2.6rem, 8vw, 6rem); font-weight: 300;
  letter-spacing: 0.01em; color: #f5efdf; text-shadow: 0 4px 40px rgba(0,0,0,0.6); margin: 0;
}
.hero-title__label {
  font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.2rem;
}
.hero-title__label--below { margin-bottom: 0; margin-top: 1.2rem; }
.arc-search-btn {
  font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px 36px; margin-top: 2.4rem; border-radius: 999px; border: 1px solid rgba(245,239,223,0.4);
  background: rgba(255,255,255,0.05); color: #f5efdf; cursor: pointer;
  backdrop-filter: blur(4px); transition: background 0.2s, border-color 0.2s;
}
.arc-search-btn:hover { background: rgba(245,239,223,0.12); border-color: rgba(245,239,223,0.7); }

.arc-search-panel { max-width: 780px; margin: 3rem auto; padding: 40px 24px 0; scroll-margin-top: 110px; }
#arc-q {
  width: 100%; padding: 0.9rem 1.1rem; font-size: 1rem; font-family: var(--font-sans, sans-serif);
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--entry); color: var(--primary); margin-bottom: 1.2rem;
}
#arc-q::placeholder { color: var(--secondary); }
.arc-year-filters {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 1.4rem;
}
.arc-year-btn {
  font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
  color: rgba(245,239,223,0.6); background: transparent;
  border: 1px solid rgba(245,239,223,0.18); border-radius: 999px;
  padding: 9px 18px; cursor: pointer; transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.arc-year-btn__count { color: rgba(245,239,223,0.35); margin-left: 4px; }
.arc-year-btn:hover { color: #f5efdf; border-color: rgba(245,239,223,0.4); }
.arc-year-btn.is-active { color: #0b0e17; background: var(--gold, #8fb8d9); border-color: var(--gold, #8fb8d9); }
.arc-year-btn.is-active .arc-year-btn__count { color: rgba(11,14,23,0.55); }
.arc-filters-spoiler { margin-bottom: 2rem; }
.arc-filters-spoiler summary {
  cursor: pointer; font-family: var(--font-sans, sans-serif); font-size: 0.85rem;
  color: var(--secondary); padding: 0.4rem 0; user-select: none;
}
.arc-filters-spoiler summary:hover { color: var(--primary); }
.arc-tag-filters { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.8rem; }
.arc-tag-group { border: 1px solid var(--border); border-radius: 8px; padding: 0 0.9rem; }
.arc-tag-group__summary {
  cursor: pointer; list-style: none; user-select: none;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono, monospace); font-size: 0.72rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--gold, #8fb8d9);
  padding: 0.7rem 0;
}
.arc-tag-group__summary::-webkit-details-marker { display: none; }
.arc-tag-group__count { color: var(--secondary); font-size: 0.68rem; letter-spacing: 0.05em; }
.arc-tag-group[open] .arc-tag-group__summary { border-bottom: 1px solid var(--border); }
.arc-tag-group__body { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.8rem 0; }
.arc-tag-btn {
  border: 1px solid var(--border); background: transparent; color: var(--secondary);
  border-radius: 999px; padding: 0.35rem 1rem; cursor: pointer; font-size: 0.78rem; letter-spacing: 0.04em;
  font-family: var(--font-sans, sans-serif);
}
.arc-tag-btn.active { background: var(--gold, #8fb8d9); border-color: var(--gold, #8fb8d9); color: #0b0e17; }
.arc-results { display: grid; gap: 1rem; }
.arc-card {
  display: block; padding: 1.1rem 1.3rem; border: 1px solid var(--border);
  border-radius: 8px; text-decoration: none; color: inherit; transition: border-color 0.2s, background 0.2s;
}
.arc-card:hover { border-color: var(--gold, #8fb8d9); background: rgba(34,158,217,0.05); }
.arc-card-date { font-family: var(--font-mono, monospace); font-size: 0.72rem; color: var(--secondary); letter-spacing: 0.05em; }
.arc-card-title { font-family: var(--font-serif, Georgia, serif); font-weight: 400; font-size: 1.2rem; color: var(--primary); margin: 0.3rem 0; }
.arc-card-resumen { font-size: 0.9rem; color: var(--content); line-height: 1.5; }
.arc-card-temi { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 6px; }
.arc-card-temi span { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gold, #8fb8d9); background: rgba(34,158,217,0.12); padding: 2px 8px; border-radius: 3px; }
.arc-empty { opacity: 0.5; text-align: center; padding: 2rem 0; }
</style>

<script>
(function () {
  var vid = document.querySelector('#arc-hero .hero-video');
  var panel = document.getElementById('arc-search-panel');

  /* Loader video: sparisce a 'playing', con fallback a 5s se il video
     impiega troppo (rete lenta) cosi' non resta appeso a vita. */
  var arcHeroLoader = document.getElementById('arc-hero-loader');
  if (arcHeroLoader && vid) {
    var hideArcHeroLoader = function() { arcHeroLoader.classList.add('hero-loader--hidden'); };
    vid.addEventListener('playing', hideArcHeroLoader, { once: true });
    setTimeout(hideArcHeroLoader, 5000);
  }

  function smoothScrollTo(targetY, duration) {
    var startY = window.scrollY;
    var dist = targetY - startY;
    var startT = null;
    function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function step(ts) {
      if (!startT) startT = ts;
      var p = Math.min((ts - startT) / duration, 1);
      window.scrollTo(0, startY + dist * ease(p));
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  window.arcScrollToSearch = function () {
    panel.hidden = false;
    smoothScrollTo(panel.offsetTop, 1800);
  };

  /* Se l'utente e' gia' sceso manualmente (scrollY oltre una piccola
     soglia), rinuncia all'autoscroll verso la ricerca (vedi stessa
     logica in home: controlla la posizione reale, non un evento
     'wheel' che scatterebbe anche per un piccolo tocco senza scroll). */
  var USER_SCROLL_THRESHOLD = 80;

  if (!vid) return;
  var lastTime = 0;
  var scrolled = false;
  vid.addEventListener('timeupdate', function () {
    if (!scrolled && vid.currentTime < lastTime - 0.5) {
      scrolled = true;
      if (window.scrollY <= USER_SCROLL_THRESHOLD) window.arcScrollToSearch();
    }
    lastTime = vid.currentTime;
  });
})();
(function () {
  var data = [];
  var q = document.getElementById('arc-q');
  var temiWrap = document.getElementById('arc-temi');
  var yearsWrap = document.getElementById('arc-years');
  var results = document.getElementById('arc-results');
  var toggle = document.getElementById('arc-search-toggle');
  var panel = document.getElementById('arc-search-panel');
  var activeTemi = new Set();
  var activeYear = 'tutti';

  toggle.addEventListener('click', function () {
    panel.hidden = !panel.hidden;
    if (!panel.hidden) { q.focus(); panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  });

  fetch('{{ "/index.json" | relURL }}')
    .then(function (r) { return r.json(); })
    .then(function (json) {
      data = json;
      renderYearFilters();
      renderTemiFilters();
      render();
    });

  function renderYearFilters() {
    var counts = {};
    data.forEach(function (item) {
      var y = (item.date || '').slice(0, 4);
      if (!y) return;
      counts[y] = (counts[y] || 0) + 1;
    });
    var years = Object.keys(counts).sort(function (a, b) { return b - a; });
    yearsWrap.innerHTML = '';

    var tuttiBtn = document.createElement('button');
    tuttiBtn.type = 'button';
    tuttiBtn.className = 'arc-year-btn is-active';
    tuttiBtn.innerHTML = 'Tutti <span class="arc-year-btn__count">' + data.length + '</span>';
    tuttiBtn.addEventListener('click', function () { setActiveYear('tutti', tuttiBtn); });
    yearsWrap.appendChild(tuttiBtn);

    years.forEach(function (y) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'arc-year-btn';
      btn.innerHTML = y + ' <span class="arc-year-btn__count">' + counts[y] + '</span>';
      btn.addEventListener('click', function () { setActiveYear(y, btn); });
      yearsWrap.appendChild(btn);
    });
  }

  function setActiveYear(year, btn) {
    activeYear = year;
    yearsWrap.querySelectorAll('.arc-year-btn').forEach(function (b) { b.classList.toggle('is-active', b === btn); });
    render();
  }

  function renderTemiFilters() {
    var all = new Set();
    data.forEach(function (item) { (item.temi || []).forEach(function (t) { all.add(t); }); });
    temiWrap.innerHTML = '';
    /* Temi raggruppati per lettera iniziale in pannelli apribili
       (sono moltissimi: un unico blocco aperto sarebbe illeggibile). */
    var sorted = Array.from(all).sort(function (a, b) { return a.localeCompare(b, 'it'); });
    var groups = {};
    var letterOrder = [];
    sorted.forEach(function (tema) {
      var letter = tema.charAt(0).toUpperCase();
      if (!groups[letter]) { groups[letter] = []; letterOrder.push(letter); }
      groups[letter].push(tema);
    });
    letterOrder.forEach(function (letter) {
      var group = document.createElement('details');
      group.className = 'arc-tag-group';
      var summary = document.createElement('summary');
      summary.className = 'arc-tag-group__summary';
      summary.innerHTML = letter + ' <span class="arc-tag-group__count">' + groups[letter].length + '</span>';
      group.appendChild(summary);
      var body = document.createElement('div');
      body.className = 'arc-tag-group__body';
      groups[letter].forEach(function (tema) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'arc-tag-btn';
        btn.textContent = tema;
        btn.addEventListener('click', function () {
          if (activeTemi.has(tema)) { activeTemi.delete(tema); btn.classList.remove('active'); }
          else { activeTemi.add(tema); btn.classList.add('active'); }
          render();
        });
        body.appendChild(btn);
      });
      group.appendChild(body);
      temiWrap.appendChild(group);
    });
  }

  function matches(item, query) {
    if (activeYear !== 'tutti' && (item.date || '').slice(0, 4) !== activeYear) return false;
    if (activeTemi.size > 0) {
      var itemTemi = item.temi || [];
      for (var t of activeTemi) { if (itemTemi.indexOf(t) === -1) return false; }
    }
    if (!query) return true;
    query = query.toLowerCase();
    var haystack = [item.title, item.resumen].concat(item.temi || []).join(' ').toLowerCase();
    return haystack.indexOf(query) !== -1;
  }

  function render() {
    var query = q.value.trim();
    var filtered = data.filter(function (item) { return matches(item, query); });
    results.innerHTML = '';
    if (filtered.length === 0) {
      results.innerHTML = '<p class="arc-empty">Nessun risultato.</p>';
      return;
    }
    filtered.sort(function (a, b) { return a.date < b.date ? 1 : -1; });
    filtered.forEach(function (item) {
      var card = document.createElement('a');
      card.className = 'arc-card';
      card.href = item.url;
      var temiHtml = (item.temi || []).map(function (t) { return '<span>' + t + '</span>'; }).join('');
      card.innerHTML =
        '<div class="arc-card-date">' + item.date + '</div>' +
        '<div class="arc-card-title">' + item.title + '</div>' +
        '<div class="arc-card-resumen">' + (item.resumen || '') + '</div>' +
        (temiHtml ? '<div class="arc-card-temi">' + temiHtml + '</div>' : '');
      results.appendChild(card);
    });
  }

  q.addEventListener('input', render);
})();
</script>
{{ end }}
