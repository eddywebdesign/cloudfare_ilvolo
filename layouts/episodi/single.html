{{ define "main" }}
<script>
(function () {
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
})();
</script>
<article class="ep-single">
  <a class="ep-back" href="/archivio/" onclick="event.preventDefault(); if (window.history.length > 1) { window.history.back(); } else { window.location.href = '/archivio/'; }" aria-label="Torna indietro">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M15 19 8 12l7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Indietro</span>
  </a>
  <header class="ep-header">
    <p class="lbl">Puntata</p>
    <h1 class="ep-title">{{ .Title }}</h1>
    <div class="ep-meta">
      <span>{{ .Date | time.Format ":date_long" }}</span>
      {{ with .Params.durata }}<span> · {{ . }}</span>{{ end }}
    </div>
    {{ with .Params.resumen }}<p class="ep-resumen">{{ . }}</p>{{ end }}
  </header>

  {{/* Niente riproduzione diretta sul sito (rischio copyright, vedi
       memoria progetto): al posto del player <audio> reale, un finto
       player solo visivo, cliccabile, che rimanda all'ascolto su
       RadioDeejay (.Params.fonte). */}}
  {{ with .Params.fonte }}
  <a class="ep-audio ep-audio-fake" href="{{ . }}" target="_blank" rel="noopener" aria-label="Ascolta la puntata su RadioDeejay">
    <span class="ep-audio-fake__play">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.3"/><path d="M10 8.2l6 3.8-6 3.8V8.2z" fill="currentColor"/></svg>
    </span>
    <span class="ep-audio-fake__body">
      <span class="ep-audio-fake__bar"><span class="ep-audio-fake__bar-fill"></span></span>
      <span class="ep-audio-fake__label">Ascolta su RadioDeejay</span>
    </span>
  </a>
  {{ end }}

  {{/* Video letture ufficiali (YouTube/Facebook/Instagram), segnalati
       manualmente in data/video_letture_sources.json e arricchiti via
       scripts/genera_video_letture.mjs con metadata pubblici (og:meta o
       oEmbed, mai login/scraping). Stesso principio delle Pillole: solo
       copertina + testo + link alla fonte, mai il video ospitato da noi. */}}
  {{ $videoLetture := index .Site.Data.video_letture .File.ContentBaseName }}
  {{ if $videoLetture }}
  <section class="ep-video-letture">
    <p class="lbl lbl--sm">Video letture</p>
    <div class="ep-vl-list">
      {{ range $videoLetture }}
      <a class="ep-vl-card" href="{{ .url }}" target="_blank" rel="noopener">
        {{ with .cover }}<img class="ep-vl-cover" src="{{ . }}" alt="" loading="lazy">{{ end }}
        <div class="ep-vl-body">
          <span class="ep-vl-piattaforma">{{ .piattaforma }}</span>
          <p class="ep-vl-testo">{{ with .testo }}{{ . }}{{ else }}{{ .titolo }}{{ end }}</p>
        </div>
      </a>
      {{ end }}
    </div>
  </section>
  {{ end }}

  {{/* Le voci in .Params.temi sono in realta' titoli di Pillole ufficiali
       di deejay.it (verificato: coincidono sempre 1:1), non temi generici.
       scripts/fetch-episodi.mjs scarica anche URL/durata di ogni pillola in
       data/pillole/<data>.json (pilota: solo le puntate coperte dalle ultime
       8 pagine di /highlights/, circa l'ultimo mese) — quando disponibili si
       mostrano come card cliccabili verso la pagina Pillola su deejay.it
       (stessa scelta "niente audio diretto sul sito" fatta per la puntata
       intera). Se i dati non sono ancora stati scaricati per questa data,
       fallback al vecchio tag di ricerca interna per non rompere le ~2000
       puntate non ancora coperte dal pilota. */}}
  {{ $pillole := index .Site.Data.pillole .File.ContentBaseName }}
  {{ if $pillole }}
  <div class="ep-temi">
    <p class="lbl lbl--sm">Pillole di questa puntata</p>
    <div class="ep-pillole-list">
      {{ range $pillole }}
      <a class="ep-pillola" href="{{ .url }}" target="_blank" rel="noopener">
        <span class="ep-pillola-titolo">{{ .titolo }}</span>
        <span class="ep-pillola-meta">dalla puntata del {{ $.Date | time.Format ":date_long" }} &middot; durata {{ .durata }}</span>
      </a>
      {{ end }}
    </div>
  </div>
  {{ else }}
  {{ with .Params.temi }}
  <div class="ep-temi">
    <p class="lbl lbl--sm">Temi di questa puntata</p>
    <div class="ep-temi-list">
      {{/* Il tag rimanda alla ricerca in /archivio/ (con lo stesso motore
           testuale usato dalla home), non alla pagina di tassonomia
           /temi/<tema>/: quella non ha un template custom, cade nel layout
           di default di PaperMod (fuori palette, spesso con un solo link
           generico) invece di mostrare risultati utili. */}}
      {{ range . }}<a class="ep-tema" href="/archivio/?q={{ . | urlquery }}">{{ . }}</a>{{ end }}
    </div>
  </div>
  {{ end }}
  {{ end }}

  {{/* Libri/film citati nella puntata, da data/riferimenti/<data>.json
       (categoria musica esclusa: gia' coperta da Playlist sotto). Il link
       verso /archivio/?q=<titolo> riusa il motore di ricerca gia' esistente
       (layouts/index.json indicizza categorieRif/riferimenti per episodio),
       che mostra automaticamente TUTTE le puntate che citano lo stesso
       titolo — niente nuova struttura dati di cross-reference da costruire. */}}
  {{ $tuttiRiferimenti := index .Site.Data.riferimenti .File.ContentBaseName }}
  {{ $libriFilm := slice }}
  {{ if $tuttiRiferimenti }}
    {{ $libriFilm = where $tuttiRiferimenti "categoria" "in" (slice "libro" "film") }}
    {{ $libriFilm = where $libriFilm "note" "ne" "non identificato" }}
    {{ $libriFilm = where $libriFilm "titolo" "ne" "" }}
  {{ end }}
  {{ if gt (len $libriFilm) 0 }}
  <section class="ep-riferimenti">
    <p class="lbl lbl--sm">Libri e film citati</p>
    <div class="ep-rif-list">
      {{ range $libriFilm }}
      <a class="ep-rif" href="/archivio/?q={{ .titolo | urlquery }}">
        <span class="ep-rif-cat">{{ .categoria }}</span>
        <span class="ep-rif-titolo">{{ .titolo }}</span>
        {{ if or .autore .anno }}
        <span class="ep-rif-meta">{{ .autore }}{{ if and .autore .anno }} &middot; {{ end }}{{ .anno }}</span>
        {{ end }}
      </a>
      {{ end }}
    </div>
  </section>
  {{ end }}

  <div class="ep-content">
    {{ .Content }}
  </div>

  {{/* Frammenti: generati da scripts/genera_frammenti.py raggruppando i
       turni di parola della trascrizione WhisperX. Solo quelli con un
       titolo assegnato a mano vengono mostrati (i grezzi sono troppi
       e senza contesto per essere presentati cosi' come sono). */}}
  {{ $tuttiFrammenti := index .Site.Data.frammenti .File.ContentBaseName }}
  {{ $frammentiCurati := slice }}
  {{ if $tuttiFrammenti }}{{ $frammentiCurati = where $tuttiFrammenti "titolo" "ne" "" }}{{ end }}
  {{ if gt (len $frammentiCurati) 0 }}
  <section class="ep-frammenti">
    <p class="lbl lbl--sm">Frammenti di questa puntata</p>
    {{ range $frammentiCurati }}
    <article class="ep-framm-card">
      <div class="ep-framm-head">
        {{/* Niente <audio> locale (rischio copyright, vedi sopra): il
             badge orario e' un link generico alla puntata su RadioDeejay
             (.Params.fonte), non al secondo esatto — una pagina esterna
             non supporta il deep-link al timestamp, ma l'orario resta
             scritto in chiaro cosi' l'utente sa dove cercare una volta li'. */}}
        <a class="ep-framm-time" href="{{ $.Params.fonte }}" target="_blank" rel="noopener" title="Ascolta su RadioDeejay">
          <svg class="ep-framm-play" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 5.5l4 2.5-4 2.5V5.5z" fill="currentColor"/></svg>
          {{ printf "%02d:%02d" (div (int .start) 60) (mod (int .start) 60) }} &ndash; {{ printf "%02d:%02d" (div (int .end) 60) (mod (int .end) 60) }}
        </a>
        {{ with .tipo }}<span class="ep-framm-tipo">{{ . }}</span>{{ end }}
      </div>
      <p class="ep-framm-titolo">{{ .titolo }}</p>
      {{ with .video_url }}
      {{ $videoUrl := . }}
      <div class="ep-framm-video">
        {{ if or (in $videoUrl "youtube.com") (in $videoUrl "youtu.be") }}
        {{ $ytID := "" }}
        {{ if in $videoUrl "youtu.be/" }}
          {{ $ytID = index (split (index (split $videoUrl "youtu.be/") 1) "?") 0 }}
        {{ else if in $videoUrl "v=" }}
          {{ $ytID = index (split (index (split $videoUrl "v=") 1) "&") 0 }}
        {{ end }}
        <iframe src="https://www.youtube.com/embed/{{ $ytID }}" width="100%" height="100%" style="border:none;overflow:hidden" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="true"></iframe>
        {{ else if in $videoUrl "instagram.com" }}
        <iframe src="{{ $videoUrl | strings.TrimSuffix "/" }}/embed" width="100%" height="100%" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>
        {{ else }}
        <iframe src="https://www.facebook.com/plugins/video.php?href={{ $videoUrl | urlquery }}&show_text=false" width="100%" height="100%" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true"></iframe>
        {{ end }}
      </div>
      {{ end }}
      <p class="ep-framm-testo">&laquo;{{ .testo }}&raquo;</p>
      {{ with .tema }}
      <div class="ep-framm-temi">{{ range . }}<span class="ep-tema">{{ . }}</span>{{ end }}</div>
      {{ end }}
    </article>
    {{ end }}
  </section>
  {{ end }}

  {{/* Playlist: generata da scripts/genera_playlist.py, scaricata dalla
       pagina "playlist del giorno" di deejay.it (stesso pattern dati di
       data/frammenti/: file JSON compatto in data/playlist/, committato). */}}
  {{ $playlist := index .Site.Data.playlist .File.ContentBaseName }}
  {{ if $playlist }}
  <section class="ep-playlist">
    <div class="ep-playlist-head">
      <p class="ep-playlist-title">Playlist del {{ .Date | time.Format ":date_long" }}</p>
      <a class="ep-playlist-open" href="/playlist/" aria-label="Tutte le playlist" title="Tutte le playlist">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="3.5" y="3.5" width="17" height="17" rx="2" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9.5 14.5 14.5 9.5M14.5 9.5H10.2M14.5 9.5V13.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
    <ul class="ep-playlist-list">
      {{ range $playlist }}
      <li class="ep-playlist-item">
        {{ if .cover }}
        <img class="ep-playlist-cover" src="{{ .cover }}" alt="" loading="lazy">
        {{ else }}
        <span class="ep-playlist-cover ep-playlist-cover--placeholder">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M9 17V5.5L19 4v11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="6.5" cy="17.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <circle cx="16.5" cy="15.5" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        {{ end }}
        <div class="ep-playlist-info">
          <span class="ep-playlist-song">{{ .titolo }}</span>
          <span class="ep-playlist-artist">{{ .artista }}</span>
        </div>
      </li>
      {{ end }}
    </ul>
  </section>
  {{ end }}

  {{ with .Params.fonte }}
  <p class="ep-fonte"><a href="{{ . }}" target="_blank" rel="noopener">Ascolta su RadioDeejay <span class="ep-fonte__arrow">→</span></a></p>
  {{ end }}
</article>

<style>

/* Riallinea la pagina puntata alla palette/tipografia del resto del
   sito: senza queste variabili la pagina usava i colori/font generici
   di PaperMod (grigio scuro, Georgia) invece della palette custom. */
/* :root[data-theme="dark"] del tema ha specificita' piu' alta di un
   semplice :root, quindi senza questo stesso selettore le variabili
   sotto verrebbero ignorate a favore della palette grigia di default. */
:root, :root[data-theme="dark"] {
  --font-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-sans:  'General Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'IBM Plex Mono', monospace;
  --gold: #8fb8d9;
  --theme: #0b0e17;
  --entry: #161b29;
  --primary: #f5efdf;
  --secondary: #9aa1ad;
  --tertiary: #232838;
  --content: rgba(245,239,223,0.78);
  --border: rgba(245,239,223,0.14);
  --code-bg: #161b29;
}
body { font-family: var(--font-sans); }

/* Header: stessa palette/font delle altre pagine, ma statico in cima
   (qui non c'e' un hero sotto da far trasparire). */
header.header {
  position: fixed !important; top: 0; left: 0; right: 0; z-index: 100; width: 100vw;
  background: var(--theme) !important;
  border-bottom: 1px solid var(--border);
}
header.header #menu a {
  color: rgba(245,239,223,0.75) !important; font-family: var(--font-sans) !important;
  font-size: 1rem !important; font-weight: 400 !important; letter-spacing: -0.01em !important;
  text-decoration: none !important;
}
header.header #menu a:hover, header.header #menu .active { color: #f5efdf !important; }
.logo, .logo a, .logo span { color: #f5efdf !important; font-style: italic; font-weight: 300; text-decoration: none !important; }
.logo-switches a.theme-toggle { color: #8fb8d9 !important; }

.ep-single { max-width: 760px; margin: 0 auto; padding: 140px 24px 100px; }
{{/* Spostata da inline in cima pagina a fissa in basso a sinistra
     (richiesta utente), solo su questa pagina: .top-link del tema
     (freccia "torna su") e' fisso in basso a DESTRA (bottom:4rem;
     right:2rem in footer.css), quindi qui restiamo sul lato opposto
     senza sovrapposizioni. */}}
.ep-back {
  position: fixed; bottom: 2rem; left: 2rem; z-index: 99;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-sans); font-size: 0.85rem; color: var(--secondary);
  text-decoration: none; background: var(--tertiary); border: 1px solid var(--border);
  padding: 10px 16px 10px 12px; border-radius: 64px; transition: color 0.2s, border-color 0.2s;
}
.ep-back svg { width: 16px; height: 16px; flex-shrink: 0; }
.ep-back:hover { color: var(--gold); border-color: var(--gold); }
@media (max-width: 640px) { .ep-back { bottom: 1.2rem; left: 1.2rem; padding: 8px 14px 8px 10px; font-size: 0.8rem; } }
.ep-header .lbl { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
.ep-title { font-family: var(--font-serif); font-weight: 300; font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--primary); margin: 0 0 0.8rem; line-height: 1.15; }
.ep-meta { font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.05em; color: var(--secondary); margin-bottom: 1.2rem; }
.ep-resumen { font-family: var(--font-sans); font-size: 1.05rem; color: var(--content); line-height: 1.7; margin-bottom: 2rem; }
.ep-audio { margin-bottom: 2rem; }
.ep-audio-fake { display: flex; align-items: center; gap: 14px; width: 100%; background: var(--entry); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; text-decoration: none; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
.ep-audio-fake:hover { border-color: var(--gold); background: var(--tertiary); }
.ep-audio-fake__play { flex-shrink: 0; width: 34px; height: 34px; color: var(--gold); }
.ep-audio-fake__play svg { width: 100%; height: 100%; }
.ep-audio-fake__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.ep-audio-fake__bar { position: relative; height: 4px; border-radius: 2px; background: rgba(245,239,223,0.14); overflow: hidden; }
.ep-audio-fake__bar-fill { position: absolute; top: 0; left: 0; bottom: 0; width: 28%; background: var(--gold); border-radius: 2px; }
.ep-audio-fake__label { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--secondary); }
.ep-audio-fake:hover .ep-audio-fake__label { color: var(--gold); }
.ep-temi { margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.lbl--sm { font-size: 0.65rem !important; opacity: 0.7; }
.ep-temi-list { display: flex; flex-wrap: wrap; gap: 8px; }
.ep-tema { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--gold); background: rgba(143,184,217,0.12); padding: 5px 12px; border-radius: 3px; text-decoration: none; }
.ep-tema:hover { background: rgba(143,184,217,0.25); }
.ep-pillole-list { display: flex; flex-direction: column; gap: 0.6rem; }
.ep-pillola { display: block; background: var(--entry); border-radius: 8px; padding: 0.8rem 1.1rem; text-decoration: none; transition: background 0.2s; }
.ep-pillola:hover { background: var(--tertiary); }
.ep-pillola-titolo { display: block; font-family: var(--font-serif); font-weight: 400; font-size: 1rem; color: var(--primary); margin-bottom: 0.3rem; }
.ep-pillola-meta { display: block; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.04em; color: var(--secondary); }
.ep-riferimenti { margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.ep-rif-list { display: flex; flex-direction: column; gap: 0.6rem; }
.ep-rif { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; background: var(--entry); border-radius: 8px; padding: 0.8rem 1.1rem; text-decoration: none; transition: background 0.2s; }
.ep-rif:hover { background: var(--tertiary); }
.ep-rif-cat { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(143,184,217,0.12); padding: 2px 9px; border-radius: 3px; flex-shrink: 0; }
.ep-rif-titolo { font-family: var(--font-serif); font-weight: 400; font-size: 1rem; color: var(--primary); }
.ep-rif-meta { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.04em; color: var(--secondary); width: 100%; }
.ep-video-letture { margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.ep-vl-list { display: flex; flex-direction: column; gap: 0.8rem; }
.ep-vl-card { display: flex; gap: 14px; background: var(--entry); border-radius: 8px; padding: 0.9rem; text-decoration: none; transition: background 0.2s; overflow: hidden; }
.ep-vl-card:hover { background: var(--tertiary); }
.ep-vl-cover { width: 96px; height: 96px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--tertiary); }
.ep-vl-body { display: flex; flex-direction: column; gap: 0.4rem; min-width: 0; justify-content: center; }
.ep-vl-piattaforma { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(143,184,217,0.12); padding: 2px 9px; border-radius: 3px; align-self: flex-start; }
.ep-vl-testo { font-family: var(--font-sans); font-size: 0.88rem; color: var(--content); line-height: 1.5; margin: 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
@media (max-width: 480px) { .ep-vl-cover { width: 64px; height: 64px; } }
.ep-content { font-family: var(--font-sans); color: var(--content); line-height: 1.8; }
.ep-fonte { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.ep-fonte a { color: var(--gold); text-decoration: none; font-size: 0.9rem; font-family: var(--font-sans); font-weight: 400; text-transform: uppercase; letter-spacing: 0.04em; }
.ep-fonte__arrow { margin-left: 0.5em; }
.ep-fonte a:hover { text-decoration: underline; }

.ep-frammenti { margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }
.ep-framm-card { background: var(--entry); border-radius: 8px; padding: 1.1rem 1.3rem; }
.ep-framm-head { display: flex; align-items: center; gap: 10px; margin-bottom: 0.6rem; }
.ep-framm-time { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.05em; color: var(--secondary); text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
.ep-framm-time:hover { color: var(--gold); }
.ep-framm-play { width: 15px; height: 15px; flex-shrink: 0; }
.ep-framm-tipo { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(143,184,217,0.12); padding: 2px 9px; border-radius: 3px; }
.ep-framm-titolo { font-family: var(--font-serif); font-weight: 400; font-size: 1.1rem; color: var(--primary); margin: 0 0 0.6rem; }
.ep-framm-video { aspect-ratio: 16/9; background: var(--tertiary); border-radius: 6px; overflow: hidden; margin-bottom: 0.8rem; }
.ep-framm-testo { font-family: var(--font-sans); font-style: italic; font-size: 0.92rem; color: var(--content); line-height: 1.6; border-left: 2px solid var(--border); padding-left: 0.9rem; margin: 0 0 0.6rem; }
.ep-framm-temi { display: flex; flex-wrap: wrap; gap: 6px; }
.ep-playlist { margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
.ep-playlist-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 0.4rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
