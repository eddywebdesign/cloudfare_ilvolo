baseURL = "https://eddydl.altervista.org/"
locale = "it-IT"
title = "Il Volo della Sera"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  author = "Fabio Volo"
  defaultTheme = "dark"
  disableThemeToggle = true

[params.assets]
  favicon = "/immagini/favicon.png"
  favicon16x16 = "/immagini/favicon.png"
  favicon32x32 = "/immagini/favicon.png"
  apple_touch_icon = "/immagini/favicon.png"

[params.label]
  text = "ilVolodellaSera"
  description = "Archivio e riflessioni dal programma di Radio Deejay"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true

[params.footer]
  text = "[ilvolodellasera.web@gmail.com](mailto:ilvolodellasera.web@gmail.com)"

[params.homeInfoParams]
  Title = "Il Volo del Mattino"
  Content = "Momenti, storie e spunti esistenziali dal programma di Fabio Volo su Radio Deejay."

[[params.socialIcons]]
  name = "link"
  url = "https://www.deejay.it/programmi/il-volo-del-mattino/"


[taxonomies]
  tema = "temi"

[outputs]
  home = ["HTML", "RSS", "JSON"]
